server:
  port: 8090

spring:
  application:
    name: checkout-service
  threads:
    virtual:
      enabled: true   # Spring Boot 4 / Java 21: request-handling threads become virtual threads

management:
  endpoints:
    web:
      exposure:
        include: health, prometheus, threaddump, configprops
  prometheus:
    metrics:
      export:
        enabled: true

# --- checkout-vault specific config ---
checkout-vault:
  isolation:
    mode: isolated   # naive | isolated — naive version first, per plan step 2

  dependencies:
    fraud:
      base-url: http://localhost:8080
      path: /fraud/score
      permits: 5
      timeout-ms: 500
    payment:
      base-url: http://localhost:8081
      path: /payment/charge
      permits: 5
      timeout-ms: 500
    inventory:
      base-url: http://localhost:8082
      path: /inventory/SKU-123
      permits: 5
      timeout-ms: 500